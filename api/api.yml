          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'

      security:
        - ApiKeyAuth: []

components:
  schemas:
    Profile:
      type: object
      properties:
        username:
          type: string
          example: "martipiris"

        bio:
          type: string
          example: "Software engineering student"

        registered:
          type: string
          format: date
          example: "2026-4-16"

        avatar:
          type: string
          example: "https://storage.googleapis.com/issue-tracker2026-media/avatars/Screenshot_2026-05-14_235458.png"

        open_assigned_issues:
          type: array
          items:
            $ref: '#/components/schemas/Issue'

        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'

        watched_issues:
          type: array
          items:
            $ref: '#/components/schemas/Issue'

        api-key:
          type: string
          example: "GUT16hZNz179keYwClqbbRMM9subGnR2"

    Issue:
      type: object
      properties:
        id:
          type: integer
          example: 1
        subject:
          type: string
          example: "Bug in login"
        description:
          type: string
          example: "Logging in sometimes throws unexpected errors."
        status:
          type: string
          example: "Open"
        priority:
          type: string
          example: "High"
        severity:
          type: string
          example: "Normal"
        type:
          type: string
          example: "Bug"
        creator:
          type: string
          example: "martipiris"
        assignee:
          type: string
          example: "Andreu-Caro"
        created_at:
          type: string
          format: date-time
          example: "2026-05-04T21:00:00Z"
        modified_at:
          type: string
          format: date-time
          example: "2026-05-04T21:00:00Z"
        deadline:
          type: string
          format: date
          example: "2026-05-08"
    IssueDetail:
      allOf:
        - $ref: '#/components/schemas/Issue'
        - type: object
          properties:
            description:
              type: string
              example: "The login button is not working on Chrome"
            comments:
              type: array
              items:
                $ref: '#/components/schemas/Comment'
            attachments:
              type: array
              items:
                $ref: '#/components/schemas/Attachment'
            tags:
              type: array
              items:
                type: string
                example: "frontend"
            watchers:
              type: array
              items:
                type: string
              example: [ "Christian-Barone", "Andreu-Caro" ]
            activities:
              type: array
              items:
                $ref: '#/components/schemas/Activity'
    BulkIssues:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
            example: 1
          subject:
            type: string
            example: "Bug in login"
    WatcherResp:
      type: object
      properties:
        issue_id:
          type: integer
        current_watchers_count:
          type: integer
          example: 2
        watchers_list:
          type: array
          items:
            type: string
          example: [ "Christian-Barone", "Andreu-Caro" ]

    Attachment:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 2
        issue_id:
          type: integer
          format: int64
          example: 6
        creator_id:
          type: integer
          format: int64
          example: 8
        url:
          type: string
          format: url
          example: 'https://storage.googleapis.com/issue-tracker2026-media/attachments/barcelona.webp'
        name:
          type: string
          example: 'Barcelona'
    Comment:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        body:
          type: string
          example: "This is a comment body"
        author:
          type: string
          example: "john_doe"
        created_at:
          type: string
          format: date-time
          example: "2026-05-04T21:00:00Z"
        issue_id:
          type: integer
          format: int64
          example: 6
    Activity:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user:
          type: string
          example: "martipiris"
        field:
          type: string
          example: "watchers"
        old:
          type: string
          example: ""
        new:
          type: string
          example: "removed @martipiris"
        date:
          type: string
          format: date-time
          example: "2026-04-16T21:29:29.184088+00:00"
    SettingsObject:
      type: object
      description: "Representation of a settings record. Fields vary by entity type."
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "New"
        color:
          type: string
          example: "#70728F"
        order:
          type: integer
          description: "Not present for tags"
          example: 1
        is_default:
          type: boolean
          description: "statuses, priorities, types, severities only"
          example: true
        is_closed:
          type: boolean
          description: "statuses only"
          example: false
        slug:
          type: string
          description: "statuses only"
          example: "new"
        days_offset:
          type: integer
          nullable: true
          description: "duedates only"
          example: 7
        before_or_after:
          type: string
          enum: [before, after]
          nullable: true
          description: "duedates only"
          example: "before"

    ErrorResult:
      type: object
      properties:
        message:
          type: string
          example: 'Content is too long (maximum is 280 characters)'
      required:
        - message
  examples:
    success204:
      value:
        message: "Successfully deleted resource"
    error400:
      value:
        message: "Body is required"
    error401:
      value:
        message: "The API key you provided does not belong to any users"
    error403:
      value:
        message: "The provided API key does not authorize this action"
    error404:
      value:
        message: "There is no resource with 'id'=8"
    error409:
      value:
        message: "Duplicate comment"
    error409_watchers:
      value:
        message: "User martipiris is already watching this issue"
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: Authorization
      in: header