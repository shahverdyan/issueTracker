  /profile/{username}/:
    get:
      tags:
        - profiles
      summary: Get profile information
      operationId: getProfile
      description: | 
        Returns the profile information for the given user.
        
        `api-key` and `watched-issues` are only returned if the requested user is the same as the authorized user.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'

        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  value:
                    message: "User does not exist"

      security:
        - ApiKeyAuth: []

  /profile/:
    put:
      tags:
        - profiles
      summary: Edit user profile
      operationId: editProfile
      description: Edit the authenticated user's profile. Only provided fields are modified.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                bio:
                  type: string
                avatar:
                  type: string
                  format: binary

      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'

        '400':
          description: Invalid body format
          content:
