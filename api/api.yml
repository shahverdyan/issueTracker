openapi: 3.0.2
info:
  version: 1.0.0
  title: Issue Tracker
  description: "This is the Open API documentation for the REST API of the issue tracker developed for the ASW Lab class. All operations require authentication."
servers:
  - url: 'https://issuetracker-ff8u.onrender.com/'
  - url: 'http://localhost:8000'
paths:
  /issues/:
    get:
      tags:
        - issues
      summary: List and filter issues
      operationId: listIssues
      parameters:
        - name: search
          in: query
          description: Search text for subject or description
          schema:
            type: string
        - name: order_by
          in: query
          description: Field to order by (e.g., priority is asc, -priority is desc)
          schema:
            type: string
            enum: ['issue_type', '-issue_type', 'issue_severity', '-issue_severity', 'priority', '-priority', 'subject', '-subject', 'status', '-status', 'assignee', '-assignee', 'modified_at', '-modified_at', 'deadline', '-deadline', 'created_at', '-created_at']
        - name: issue_type
          in: query
          description: "Filter by issue type"
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [Bug, Question, Enhancement]
        - name: issue_severity
          in: query
          description: "Filter by issue severity"
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [Wishlist, Minor, Normal, Important, Critical]
        - name: priority
          in: query
          description: "Filter by priority"
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [ Low, Normal, High ]
        - name: status
          in: query
          description: "Filter by status"
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [New, In Progress, Ready for test, Needs Info, Rejected, Postponed, Closed]

        - name: assigned_to
          in: query
          description: "User ID or 'unassigned'"
          schema:
            type: string

      responses:
        '200':
          description: Issues retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Issue'
                  current_order:
                    type: string
                  total_count:
                    type: integer
                  unassigned_count:
                    type: integer
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
      security:
        - ApiKeyAuth: []
    post:
      tags:
        - issues
      summary: Create a new issue
      operationId: createIssue
      requestBody:
        description: Provide the details for the new issue
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                subject:
                  type: string
                  example: "Bug in login"
                description:
                  type: string
                  example: "The login button is not working"
                assignee:
                  type: integer
                  example: "1"
                deadline:
                  type: string
                  format: date
                  example: '2026-05-08'
                issue_type:
                  type: string
                  enum: [Bug, Question, Enhancement]
                  example: "Bug"
                priority:
                  type: string
                  enum: [Low, Normal, High]
                  example: "Normal"
                issue_severity:
                  type: string
                  enum: [Wishlist, Minor, Normal, Important, Critical]
                  example: "Normal"
                status:
                  type: string
                  enum: [New, In Progress, Ready for test, Needs Info, Rejected, Postponed, Closed]
                  example: "New"
                files:
                  type: string
                  format: binary
              required:
                - subject
        required: true
      responses:
        '201':
          description: Issue created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '400':
          description: Bad Request (Subject is required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
      security:
        - ApiKeyAuth: []
  /issues/bulk/:
    post:
      description: Create a series of issues from an array of subjects. All created issues will have identical, default parameters.
      tags:
        - issues
      summary: Bulk create a list of issues
      operationId: bulkCreateIssues
      requestBody:
        description: Provide a list of issue subjects
        content:
          application/json:
            schema:
              type: object
              properties:
                list:
                  type: array
                  items:
                    type: string
                  example: ["Issue 1", "Issue 2"]
              required:
                - list
        required: true
      responses:
        '201':
          description: Issues created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkIssues'
        '400':
          description: Bad Request (List is required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
      security:
        - ApiKeyAuth: [ ]

  /issues/{issueId}/:
    get:
      tags:
        - issues
      summary: Get issue details
      operationId: getIssue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Issue details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDetail'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: []
    put:
      tags:
        - issues
      summary: Update an issue
      description: |
        Updates an issue. All fields are optional; only provided fields are modified.

        **Editable fields** (`subject`, `description`, `status`, `issue_type`, `issue_severity`, `priority`, `tags`, `deadline`).

        **Only the issue creator** can modify the fields. To edit fields modifiable by all users (`attachments`, `watchers`, and `assignee`), use the dedicated endpoints.
      operationId: updateIssue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Fields to update (all optional; only provided fields are modified)
        required: true
        content:
          application/json:
            example:
              subject: "Updated bug title"
              description: "More details about the bug"
              status: 2
              issue_type: 1
              issue_severity: 3
              priority: 2
              tags: [1]
              deadline: "2026-06-01"
              assignee: 2
              watchers: [1, 2]
            schema:
              type: object
              properties:
                subject:
                  type: string
                  description: "New title for the issue"
                  example: "Updated bug title"
                description:
                  type: string
                  description: "New description"
                  example: "More details about the bug"
                status:
                  type: integer
                  description: "ID of the status"
                  example: 2
                issue_type:
                  type: integer
                  description: "ID of the type"
                  example: 1
                issue_severity:
                  type: integer
                  description: "ID of the severity"
                  example: 3
                priority:
                  type: integer
                  description: "ID of the priority"
                  example: 2
                tags:
                  type: array
                  description: "List of tag IDs (replaces current tags)"
                  items:
                    type: integer
                  example: [1, 3]
                deadline:
                  type: string
                  format: date
                  nullable: true
                  description: "[Creator only] Deadline date, or null to remove it"
                  example: "2026-06-01"
      responses:
        '200':
          description: Issue updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDetail'
        '400':
          description: Bad request (e.g. empty subject, unknown ID, or invalid list)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '403':
          description: Forbidden (non-creator attempted to edit an issue)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error403'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: []

    delete:
      tags:
        - issues
      summary: Delete an issue
      operationId: deleteIssue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Issue deleted
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '403':
          description: Invalid user (Only creator can delete)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error403'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: []
  /issues/{issueId}/assignee/:
    put:
      tags:
        - issues
      summary: Update an issue's assignee
      description:
        Updates an issue's assignee. Any user can update the assignee of any issue. If body does not have `user_id` key or it's null, issue will be set to `unassigned`.
      operationId: updateAssignee
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: "ID of the user to assign the issue to. Leave null or omit to set the issue as unassigned."
                  example: 1
      responses:
        '200':
          description: Assignee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDetail'
        '400':
          description: Bad request (User does not exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  value:
                    message: 'Invalid user_id'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
        '409':
          description: User is already assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  value:
                    message: "Provided user is already assigned to this issue"
      security:
        - ApiKeyAuth: [ ]

  /issues/{issue_id}/watchers/:
    post:
      tags:
        - watchers
      summary: Add a watcher to the issue
      operationId: addWatcher
      description: Any user can add `watchers` to any issue. If no `user_id` is provided, the authorized user is added instead.
      parameters:
        - name: issue_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: ID of the user to be added as a watcher
      responses:
        '201':
          description: Watcher added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatcherResp'
        '400':
          description: Bad Request (Body is required or provided user does not exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
        '409':
          description: User is already watching this issue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error409_watchers'
      security:
        - ApiKeyAuth: []
  /issues/{issue_id}/watchers/{watcher_id}:
    delete:
      tags:
        - watchers
      summary: Remove a watcher from the issue
      operationId: removeWatcher
      parameters:
        - name: issue_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: watcher_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Watcher removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatcherResp'
        '400':
          description: Bad Request (Body is required or user is not watching this issue)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: []

  /issues/{issueId}/attachments:
    get:
      tags:
        - attachments
      summary: List an issue's attachments
      operationId: listAttachments
      parameters:
        - name: issueId
          in: path
          description: Issue to get the attachments from
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Attachments retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: [ ]
    post:
      tags:
        - attachments
      summary: Upload an attachment
      operationId: uploadAttachment
      description: Creates a new attachment. Any user can upload an attachment, regardless of who owns the issue.
      parameters:
        - name: issueId
          in: path
          description: Issue to upload the attachment to
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Provide the file for the attachment
        content:
          multipart/form-data:
            schema:
              required:
                - files
              type: object
              properties:
                files:
                  type: string
                  format: binary
        required: true
      responses:
        '201':
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: []

  /attachments/{attachmentId}:
    get:
      tags:
        - attachments
      summary: Get an attachment by its ID
      operationId: getAttachment
      parameters:
        - name: attachmentId
          in: path
          description: Attachment to get the information about
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Attachment retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: [ ]
    delete:
      tags:
        - attachments
      summary: Delete an attachment
      operationId: deleteAttachment
      description: Deletes an attachment. Only the attachment uploader is allowed to delete it.
      parameters:
        - name: attachmentId
          in: path
          description: Attachment to delete
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Attachment deleted
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '403':
          description: Invalid user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error403'
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: [ ]

  /issues/{issueId}/comments/:
    get:
      tags:
        - comments
      summary: List an issue's comments
      operationId: listComments
      parameters:
        - name: issueId
          in: path
          description: Issue to get the comments from
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Comments retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
      security:
        - ApiKeyAuth: [ ]
    post:
      tags:
        - comments
      summary: Create a comment
      operationId: createComment
      parameters:
        - name: issueId
          in: path
          description: Issue to add the comment to
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Provide the body text for the comment
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  example: "This is a new comment"
              required:
                - body
        required: true
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Bad Request (Body is required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '404':
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
        '409':
          description: Duplicate comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error409'
      security:
        - ApiKeyAuth: [ ]

  /comments/{commentId}/:
    put:
      tags:
        - comments
      summary: Update a comment
      operationId: updateComment
      parameters:
        - name: commentId
          in: path
          description: Comment to update
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Provide the updated text for the comment
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  example: "Updated comment text"
              required:
                - body
        required: true
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Bad Request (Body is required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '403':
          description: Invalid user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error403'
        '404':
          description: Comment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error404'
        '409':
          description: Duplicate comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error409'
      security:
        - ApiKeyAuth: [ ]
    delete:
      tags:
        - comments
      summary: Delete a comment
      operationId: deleteComment
      parameters:
        - name: commentId
          in: path
          description: Comment to delete
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Comment deleted
        '401':
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error401'
        '403':
          description: Invalid user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error403'
        '404':
          description: Comment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
