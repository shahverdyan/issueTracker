      summary: Create a new record for a settings entity
      operationId: createSetting
      parameters:
        - name: entity
          in: path
          required: true
          schema:
            type: string
            enum: [statuses, priorities, types, severities, tags, duedates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "New Status"
                color:
                  type: string
                  example: "#FF5733"
                is_default:
                  type: boolean
                  description: "statuses, priorities, types, severities only"
                  example: false
                is_closed:
                  type: boolean
                  description: "statuses only"
                  example: false
                days_offset:
                  type: integer
                  nullable: true
                  description: "duedates only"
                  example: 7
                before_or_after:
                  type: string
                  enum: [before, after]
                  nullable: true
                  description: "duedates only"
                  example: "before"
      responses:
        '201':
          description: Record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsObject'
        '400':
          description: Bad request (e.g. missing name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
              examples:
                errorExample:
                  $ref: '#/components/examples/error400'
        '401':
          description: Invalid API key
          content:
