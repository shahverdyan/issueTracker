databases:
  - name: issueTrackerDB
    plan: free
    databaseName: database_insy
    user: admin

services:
  - type: web
    plan: free
    name: issueTracker
    runtime: python
    region: frankfurt
    buildCommand: './build.sh'
    startCommand: 'cd src && python -m gunicorn issueTracker.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: issueTrackerDB
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4